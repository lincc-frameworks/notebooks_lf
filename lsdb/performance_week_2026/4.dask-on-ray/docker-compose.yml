services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ray-prometheus
    ports:
      - "9090:9090"
    volumes:
      - /tmp/ray:/tmp/ray
    command:
      - "--config.file=/tmp/ray/session_latest/metrics/prometheus/prometheus.yml"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ray-grafana
    ports:
      - "3000:3000"
    volumes:
      - /tmp/ray:/tmp/ray
      - /tmp/ray/session_latest/metrics/grafana/grafana.ini:/etc/grafana/grafana.ini
      # Mount Ray's provisioning for dashboards, alerts, plugins
      - /tmp/ray/session_latest/metrics/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - /tmp/ray/session_latest/metrics/grafana/provisioning/plugins:/etc/grafana/provisioning/plugins
      - /tmp/ray/session_latest/metrics/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
      # Override datasources with our stable version that always points to the prometheus service
      - ./datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - prometheus
    restart: unless-stopped